<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: black;
            padding: 0;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card{
            background-color: #a09e9e;
            border-radius: 10px;
            padding: 35px;
            width: 350px;
        }
        h2{
            color: #0a0ec2;
            text-align: center;
            margin-bottom: 35px;
        }
        form{
            display: flex;
            flex-direction: column;
        }
       
        input{
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid#000000;
            
        }
        button{
            background-color: rgb(18, 18, 139);
            color: white;
            padding: 10px;
            border: 2px solid rgb(16, 16, 175);
            border-radius: 6px;
            font-size: 16px;
            
        }
        button:hover{
            background-color: #07095a;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        <form>
            <input type="email"name=""id="" placeholder="Email"/>
            <input type="password"name=""id=""placeholder="password"/>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
